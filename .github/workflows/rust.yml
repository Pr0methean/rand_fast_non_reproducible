name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ (github.ref == 'refs/heads/master' && github.sha) || (github.event_name == 'pull_request' && github.head_ref) || github.ref }}
  cancel-in-progress: false

jobs:
  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        feature-flag: [ "--no-default-features", "--all-features", "--features reproducibility_same_endianness" ]
        os: [ ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest, windows-11-arm ]
      fail-fast: false
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
      with:
        egress-policy: audit
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Run tests
      run: cargo +nightly test --verbose -p rand_triplemix ${{ matrix.feature-flag }}
      timeout-minutes: 30
  benchmarks:
    needs:
    - unit-tests
    - gungraun
    - mca
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest, windows-11-arm ]
      fail-fast: false
    permissions:
      contents: write
      deployments: write
      pull-requests: write
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
      with:
        egress-policy: audit
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Run benchmarks
      run: cargo +nightly bench -p benches --features reproducibility_cross_platform -- --output-format bencher | tee bench-output.txt
      timeout-minutes: 20
    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@a60cea5bc7b49e15c1f58f411161f99e0df48372 # v1.22.0
      with:
        name: Rust Benchmark
        tool: 'cargo'
        output-file-path: bench-output.txt
        github-token: ${{ secrets.GITHUB_TOKEN }}
        summary-always: true
        auto-push: ${{ github.event_name != 'pull_request' }}
        # Show alert with commit comment on detecting possible performance regression
        alert-threshold: '125%'
        comment-on-alert: true
        fail-on-alert: true
  mca:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cpu: [ "raptorlake", "arrowlake", "novalake", "znver3", "znver4" ]
      fail-fast: false
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: sudo apt-get install -y llvm
      - run: cargo +nightly install cargo-cross
      - name: Compile endless_bytes example
        run: RUSTFLAGS="-C target-cpu=${{ matrix.cpu }}" cargo +nightly rustc --target x86_64-unknown-linux-gnu --example endless_bytes --release --features llvm-mca -- --emit asm
      - name: Run llvm-mca
        run: llvm-mca -json --mcpu=${{ matrix.cpu }} --iterations=128 target/x86_64-unknown-linux-gnu/release/examples/endless_bytes*.s
  gungraun:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, ubuntu-24.04-arm ]
      fail-fast: false
    permissions:
      contents: write
      deployments: write
      pull-requests: write
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
      with:
        egress-policy: audit
    - run: sudo apt-get install -y valgrind
    - uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2 # v2.74.0
      with:
        tool: gungraun-runner
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: bencherdev/bencher@595a6d60abd1c71b1dfb7bbdd52be7bc63b0f8c3 # v0.6.1
    - name: Run Gungraun benchmark
      run: RUSTFLAGS="-C target-feature=-avx512f" cargo +nightly bench -p gungraun-benches --features reproducibility_cross_platform
  endianness_miri:
    name: "Test reproducibility across endiannesses"
    needs:
    - unit-tests
    - gungraun
    - mca
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: sudo apt update
      - run: rustup toolchain add nightly-x86_64-unknown-linux-gnu
      - run: rustup component add --toolchain nightly-x86_64-unknown-linux-gnu miri
      - run: cargo +nightly install --locked cargo-nextest
      - run: cargo +nightly miri nextest run --target aarch64_be-unknown-linux-gnu --features jump,zeroize,serde,reproducibility_cross_platform
